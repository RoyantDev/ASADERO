<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Inscripciones — Taller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap');

  :root{
    --magenta:#EC1E79;
    --magenta-deep:#A80F55;
    --sunshine:#FFD400;
    --sky:#29ABE2;
    --grape:#7B4FC9;
    --grape-deep:#5B33A0;
    --mint:#1ECFC0;
    --cream:#FFF7EA;
    --ink:#241B3A;
  }

  *{ box-sizing:border-box; }
  body{ margin:0; }

  .page{
    min-height:100vh;
    background:
      radial-gradient(circle at 10% 8%, rgba(41,171,226,0.16) 0, transparent 34%),
      radial-gradient(circle at 92% 6%, rgba(255,212,0,0.22) 0, transparent 32%),
      radial-gradient(circle at 90% 90%, rgba(236,30,121,0.12) 0, transparent 34%),
      var(--cream);
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    padding:44px 18px 70px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .eyebrow{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.24em;
    color:var(--grape);
    text-transform:uppercase;
    margin-bottom:8px;
  }

  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(26px, 6vw, 38px);
    margin:0 0 10px;
    text-align:center;
  }
  h1 .accent{ color:var(--magenta); }

  .subtitle{
    max-width:420px;
    text-align:center;
    color:var(--ink);
    opacity:0.65;
    font-size:15px;
    font-weight:700;
    margin:0 auto 30px;
  }

  .card{
    width:100%;
    max-width:600px;
    background:#fff;
    border:4px solid var(--ink);
    border-radius:26px;
    box-shadow:7px 7px 0 var(--ink);
    overflow:hidden;
  }
  .card-top{
    background:linear-gradient(135deg, var(--grape), var(--magenta));
    padding:20px 26px;
    color:#fff;
  }
  .card-top h2{
    font-family:'Baloo 2', sans-serif;
    font-size:17px;
    margin:0;
    font-weight:700;
  }
  .card-bottom{ padding:26px; }

  .field{ display:flex; flex-direction:column; margin-bottom:16px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }

  label{
    font-family:'Baloo 2', sans-serif;
    font-size:12.5px;
    color:var(--grape-deep);
    font-weight:700;
    margin-bottom:6px;
  }
  input, select{
    width:100%;
    border:3px solid var(--ink);
    border-radius:12px;
    background:var(--cream);
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:15.5px;
    padding:11px 13px;
    color:var(--ink);
  }
  input:focus, select:focus{ outline:none; border-color:var(--sky); }
  input::placeholder{ color:#B7ACC9; font-weight:600; }
  select{
    appearance:none;
    -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9'><path d='M1 1l6 6 6-6' stroke='%23241B3A' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;
    background-position:right 14px center;
    padding-right:36px;
  }

  button.btn{
    width:100%;
    background:var(--magenta);
    color:#fff;
    border:3px solid var(--ink);
    padding:13px 18px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:15.5px;
    border-radius:14px;
    cursor:pointer;
    box-shadow:4px 4px 0 var(--ink);
    transition:transform 0.12s ease, box-shadow 0.12s ease;
  }
  button.btn:hover{ transform:translate(-1px,-1px); box-shadow:5px 5px 0 var(--ink); }
  button.btn:active{ transform:translate(1px,1px); box-shadow:2px 2px 0 var(--ink); }
  button.btn:disabled{ opacity:0.6; cursor:default; }

  .error{
    font-family:'Nunito', sans-serif;
    font-weight:800;
    font-size:13px;
    color:var(--magenta-deep);
    min-height:16px;
    margin-bottom:6px;
  }

  .list-panel{
    width:100%;
    max-width:640px;
    margin-top:22px;
    background:#fff;
    border:4px solid var(--ink);
    border-radius:26px;
    padding:24px;
    box-shadow:7px 7px 0 var(--ink);
  }
  .list-panel h3{
    font-family:'Baloo 2', sans-serif;
    font-size:16px;
    margin:0 0 4px;
  }
  .list-note{
    font-size:12.5px;
    color:var(--grape-deep);
    font-weight:800;
    margin-bottom:14px;
  }
  table{ width:100%; border-collapse:collapse; font-size:13.5px; }
  th, td{ text-align:left; padding:8px 6px; border-bottom:1px solid #EDE7DC; }
  th{ font-family:'Baloo 2', sans-serif; font-size:11px; color:var(--grape-deep); font-weight:700; }
  .empty-row{ text-align:center; color:#B3A9C4; padding:18px 0; font-size:13px; }

  .logout{
    margin-top:20px;
    background:none;
    border:none;
    color:#9A8FB0;
    font-family:'Nunito', sans-serif;
    font-size:12.5px;
    cursor:pointer;
    text-decoration:underline;
  }

  .hidden{ display:none !important; }

  .debug{
    max-width:640px;
    width:100%;
    margin-top:14px;
    font-family:monospace;
    font-size:11px;
    color:#A80F55;
    white-space:pre-wrap;
    word-break:break-word;
  }
</style>
</head>
<body>
<div class="page">

  <div class="eyebrow">Panel privado</div>
  <h1>Inscripciones del <span class="accent">taller</span></h1>
  <p class="subtitle">Registra a cada persona solo después de confirmar su pago por WhatsApp.</p>

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <div class="card-bottom">
      <div class="field">
        <label for="pinInput">PIN de acceso</label>
        <input type="password" id="pinInput" inputmode="numeric" placeholder="••••">
      </div>
      <div class="error" id="loginError"></div>
      <button class="btn" id="loginBtn" type="button">Entrar</button>
    </div>
  </div>

  <!-- PANEL -->
  <div id="panelWrap" class="hidden" style="width:100%; display:flex; flex-direction:column; align-items:center;">

    <div class="card">
      <div class="card-top"><h2>Inscribir persona</h2></div>
      <div class="card-bottom">
        <div class="row2">
          <div class="field">
            <label for="nombreInput">Nombre completo</label>
            <input type="text" id="nombreInput" placeholder="Nombre de la persona">
          </div>
          <div class="field">
            <label for="personasInput">Personas</label>
            <select id="personasInput">
              <option value="1">1 persona</option>
              <option value="2">2 personas</option>
              <option value="3">3 personas</option>
              <option value="4">4 personas</option>
              <option value="5">5 personas</option>
              <option value="6">6 personas</option>
              <option value="7">7 personas</option>
              <option value="8">8 personas</option>
            </select>
          </div>
        </div>
        <div class="error" id="formError"></div>
        <button class="btn" id="addBtn" type="button">Inscribir y generar código</button>
      </div>
    </div>

    <div class="list-panel">
      <h3>Inscritos confirmados</h3>
      <div class="list-note" id="summary"></div>
      <table>
        <thead>
          <tr><th>Código</th><th>Nombre</th><th>Personas</th><th>Total</th></tr>
        </thead>
        <tbody id="tablaBody"></tbody>
      </table>
    </div>

    <button class="logout" id="logoutBtn">Cerrar sesión</button>
    <div class="debug" id="debugBox"></div>
  </div>

</div>

<script>
  // =========================================================
  // PEGA AQUÍ LA URL DE TU APLICACIÓN WEB DE GOOGLE APPS SCRIPT
  // (la que copiaste al implementar Code.gs). Debe verse así:
  // https://script.google.com/macros/s/AKfycb.../exec
  // =========================================================
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxtxKpcbDSlr7L2JXlZEWOR-npLZ6W83_qyZqqEofK7Ho7yOlcQDzwzUM9vcXt1q75sg/exec';

  const ADMIN_PIN = '2708';

  const loginCard = document.getElementById('loginCard');
  const panelWrap = document.getElementById('panelWrap');
  const pinInput = document.getElementById('pinInput');
  const loginBtn = document.getElementById('loginBtn');
  const loginError = document.getElementById('loginError');
  const nombreInput = document.getElementById('nombreInput');
  const personasInput = document.getElementById('personasInput');
  const formError = document.getElementById('formError');
  const addBtn = document.getElementById('addBtn');
  const tablaBody = document.getElementById('tablaBody');
  const summary = document.getElementById('summary');
  const logoutBtn = document.getElementById('logoutBtn');
  const debugBox = document.getElementById('debugBox');

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  async function getEntries(){
    try{
      const res = await fetch(SCRIPT_URL, { method: 'GET' });
      const data = await res.json();
      if(!data.ok){ throw new Error(data.error || 'Respuesta no válida'); }
      return (data.entries || []).sort((a,b)=> (a.ts||0) - (b.ts||0));
    }catch(e){
      debugBox.textContent = 'Error al leer los inscritos: ' + (e && e.message ? e.message : e);
      return [];
    }
  }

  async function renderConfirmed(){
    const confirmed = await getEntries();
    const totalPeople = confirmed.reduce((sum,e)=> sum + (parseInt(e.personas)||1), 0);
    const totalMoney = confirmed.reduce((sum,e)=> sum + (parseInt(e.total)||0), 0);

    summary.textContent = confirmed.length === 0
      ? 'Todavía no hay inscritos confirmados'
      : confirmed.length + ' inscritos · ' + totalPeople + ' personas · $' + totalMoney + ' recaudado';

    if(confirmed.length === 0){
      tablaBody.innerHTML = '<tr><td colspan="4" class="empty-row">Sin registros</td></tr>';
      return;
    }
    tablaBody.innerHTML = confirmed.map(e =>
      '<tr><td>' + escapeHtml(e.codigo || '—') + '</td><td>' + escapeHtml(e.nombre) + '</td><td>' + (e.personas||1) + '</td><td>$' + (e.total||0) + '</td></tr>'
    ).join('');
  }

  function mostrarPanel(mostrar){
    loginCard.classList.toggle('hidden', mostrar);
    panelWrap.classList.toggle('hidden', !mostrar);
  }

  loginBtn.addEventListener('click', ()=>{
    loginError.textContent = '';
    if(pinInput.value.trim() !== ADMIN_PIN){
      loginError.textContent = 'PIN incorrecto.';
      return;
    }
    pinInput.value = '';
    mostrarPanel(true);
    renderConfirmed();
  });

  pinInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') loginBtn.click();
  });

  logoutBtn.addEventListener('click', ()=>{
    mostrarPanel(false);
  });

  addBtn.addEventListener('click', async ()=>{
    formError.textContent = '';
    debugBox.textContent = '';
    const nombre = nombreInput.value.trim();
    const personas = parseInt(personasInput.value);

    if(!nombre){
      formError.textContent = 'Escribe el nombre de la persona.';
      return;
    }

    if(SCRIPT_URL.indexOf('PEGA_AQUI') !== -1){
      formError.textContent = 'Falta configurar la URL del backend (SCRIPT_URL) en el código.';
      return;
    }

    addBtn.disabled = true;
    addBtn.textContent = 'Inscribiendo...';

    try{
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight CORS
        body: JSON.stringify({ nombre, personas })
      });
      const data = await res.json();
      if(!data.ok){ throw new Error(data.error || 'No se pudo guardar'); }

      nombreInput.value = '';
      personasInput.value = '1';
      await renderConfirmed();

      formError.style.color = 'var(--mint)';
      formError.textContent = 'Inscrito con código ' + data.entry.codigo;
      setTimeout(()=>{ formError.textContent=''; formError.style.color=''; }, 4000);

    }catch(err){
      formError.textContent = 'No se pudo inscribir. Intenta de nuevo.';
      debugBox.textContent = 'Detalle del error: ' + (err && err.message ? err.message : String(err));
    }finally{
      addBtn.disabled = false;
      addBtn.textContent = 'Inscribir y generar código';
    }
  });
</script>
</body>
</html>
